<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Archive</title>
    <!-- Fonts: Orbitron (Cyberpunk), Rajdhani (Technical), Share Tech Mono (Terminal), Poppins (Body/Clean) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Poppins:wght@300;400;500&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Canvas for Particles -->
    <canvas id="particle-canvas"></canvas>

    <!-- CRT Overlay Effects -->
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="glitch-overlay" id="global-glitch"></div>

    <!-- Main Container -->
    <div id="app" class="fullscreen-container">
        
        <!-- Scene 1: Boot Sequence -->
        <div id="scene-boot" class="scene active">
            <div class="terminal-box">
                <div class="terminal-text" id="boot-text"></div>
            </div>
            
            <div class="action-container" id="unlock-container" style="display: none; opacity: 0; transition: opacity 2s ease;">
                <div class="progress-ring-container">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring__circle" stroke="#00f3ff" stroke-width="4" fill="transparent" r="52" cx="60" cy="60"/>
                    </svg>
                    <button id="btn-unlock" class="cyber-button">MỞ TIN NHẮN</button>
                </div>
                <div class="hold-hint">HOLD TO UNLOCK</div>
            </div>
        </div>

        <!-- Scene 2: Main Archive -->
        <div id="scene-archive" class="scene">
            <div class="message-container">
                <div id="archive-text" class="emotional-text"></div>
            </div>
        </div>

        <!-- Scene 3: Glitch & Final -->
        <div id="scene-error" class="scene">
            <div class="error-container glitch-effect" data-text="ERROR:
Không thể xóa nhân sự này khỏi bộ nhớ tập thể.">
                ERROR:<br>Không thể xóa nhân sự này khỏi bộ nhớ tập thể.
            </div>
        </div>

        <div id="scene-ending" class="scene">
            <div class="final-message-container">
                <div class="heart">❤️</div>
                <div class="final-text">Cảm ơn mọi người vì tất cả.</div>
                <div class="final-signature">— Tuấn Anh —</div>
                
                <button id="btn-shutdown" class="cyber-button red-glow">TẮT HỆ THỐNG</button>
            </div>
        </div>

        <div id="scene-lost" class="scene">
            <div class="lost-text">CONNECTION LOST<span class="blinking-cursor">_</span></div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="audio.js"></script>
    <script src="particles.js"></script>
    <script src="main.js"></script>
</body>
</html>
