<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Play Flappy Bird Retro Arcade directly in your browser. A mobile-friendly, side-scrolling arcade game with smooth retro graphics, custom audio effects, and scaling difficulty.">
  <title>Flappy Bird - Retro Arcade</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

    :root {
      --primary-color: #6366f1;
      --secondary-color: #ffd700;
      --bg-dark: #070b19;
      --glass-bg: rgba(15, 23, 42, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background-color: var(--bg-dark);
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient moving background glow */
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
      animation: rotateGlow 30s linear infinite;
      z-index: -1;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #game-container {
      position: relative;
      width: 400px;
      height: 700px;
      max-width: 100vw;
      max-height: 100vh;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    /* Handle mobile aspect ratios */
    @media (max-width: 450px), (max-height: 720px) {
      #game-container {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
      }
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(7, 11, 25, 0.45) 0%, rgba(7, 11, 25, 0.85) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      transform: scale(1.08);
      z-index: 10;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .glass-panel {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: 0 16px 40px 0 var(--glass-shadow);
      border-radius: 28px;
      padding: 32px 24px;
      width: 100%;
      max-width: 320px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: panelSlideUp 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.15) forwards;
    }

    @keyframes panelSlideUp {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 2px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ffe066 0%, #ff8c00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 3px 6px rgba(255, 140, 0, 0.25));
    }

    .subtitle {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
    }

    .score-panel {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
      font-size: 1.05rem;
    }

    .score-label {
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-val {
      font-weight: 800;
      font-size: 1.25rem;
    }

    .score-val.highlight {
      color: var(--secondary-color);
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    }

    .new-badge {
      font-size: 0.65rem;
      background: #ef4444;
      color: white;
      padding: 2px 6px;
      border-radius: 8px;
      font-weight: 800;
      text-transform: uppercase;
      margin-left: 6px;
      letter-spacing: 0.5px;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    .btn {
      width: 100%;
      padding: 15px 20px;
      border-radius: 16px;
      border: none;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35), inset 0 2px 4px rgba(255, 255, 255, 0.15);
      transition: all 0.2s ease;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -60%;
      width: 200%;
      height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.25) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-25deg);
      transition: 0.6s;
    }

    .btn:hover::after {
      left: 125%;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.45), inset 0 2px 4px rgba(255, 255, 255, 0.15);
      background: linear-gradient(135deg, #4f46e5 0%, #4338ca 100%);
    }

    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 10px rgba(99, 102, 241, 0.35);
    }

    .hud-score {
      position: absolute;
      top: 35px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3.8rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.45);
      z-index: 5;
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.5), opacity 0.3s ease;
      pointer-events: none;
      opacity: 0;
    }

    .hud-score.visible {
      opacity: 1;
    }

    .hud-score.pop {
      transform: translateX(-50%) scale(1.15);
    }

    .instructions {
      margin-top: 20px;
      font-size: 0.82rem;
      color: #64748b;
      line-height: 1.5;
    }

    .instructions strong {
      color: #cbd5e1;
    }

    .gameover-title {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 2px;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #ff6b6b 0%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 3px 6px rgba(239, 68, 68, 0.25));
    }
  </style>
</head>
<body>

  <div id="game-container">
    <canvas id="gameCanvas" width="400" height="700"></canvas>
    
    <!-- Real-time HUD Score -->
    <div id="hud-score" class="hud-score">0</div>

    <!-- Start Overlay Screen -->
    <div id="start-screen" class="overlay active">
      <div class="glass-panel">
        <h1>FLAPPY BIRD</h1>
        <p class="subtitle">Retro Arcade</p>
        
        <div class="score-panel">
          <div class="score-row">
            <span class="score-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--secondary-color)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              High Score
            </span>
            <span id="start-highscore-val" class="score-val highlight">0</span>
          </div>
        </div>

        <button id="start-btn" class="btn">START GAME</button>
        
        <p class="instructions">
          Tap screen or press <strong>Space / Up Arrow</strong> to flap.<br>
          Avoid pipes and don't touch the ground!
        </p>
      </div>
    </div>

    <!-- Game Over Overlay Screen -->
    <div id="gameover-screen" class="overlay">
      <div class="glass-panel">
        <h2 class="gameover-title">GAME OVER</h2>
        <p class="subtitle">Oops! You crashed.</p>
        
        <div class="score-panel">
          <div class="score-row">
            <span class="score-label">Score</span>
            <span id="final-score-val" class="score-val">0</span>
          </div>
          <div class="score-row">
            <span class="score-label">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="color:var(--secondary-color)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              Best Score <span id="new-high-badge" class="new-badge" style="display:none;">New</span>
            </span>
            <span id="best-score-val" class="score-val highlight">0</span>
          </div>
        </div>

        <button id="restart-btn" class="btn">PLAY AGAIN</button>
      </div>
    </div>
  </div>

  <script>
    // --- AUDIO SYSTEM USING WEB AUDIO API (NO EXTERNAL FILES) ---
    class SoundEffects {
      constructor() {
        this.ctx = null;
      }

      init() {
        if (!this.ctx) {
          const AudioCtx = window.AudioContext || window.webkitAudioContext;
          if (AudioCtx) {
            this.ctx = new AudioCtx();
          }
        }
        if (this.ctx && this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      playFlap() {
        this.init();
        if (!this.ctx) return;

        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = 'triangle'; // Arcade-style soft tone
        osc.frequency.setValueAtTime(260, now);
        osc.frequency.exponentialRampToValueAtTime(560, now + 0.1);

        gain.gain.setValueAtTime(0.18, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);

        osc.connect(gain);
        gain.connect(this.ctx.destination);

        osc.start(now);
        osc.stop(now + 0.1);
      }

      playScore() {
        this.init();
        if (!this.ctx) return;

        const now = this.ctx.currentTime;
        
        // Quick high-pitch chime (double beep)
        const osc1 = this.ctx.createOscillator();
        const gain1 = this.ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(523.25, now); // C5
        gain1.gain.setValueAtTime(0.12, now);
        gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
        osc1.connect(gain1);
        gain1.connect(this.ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.08);

        setTimeout(() => {
          if (!this.ctx) return;
          const now2 = this.ctx.currentTime;
          const osc2 = this.ctx.createOscillator();
          const gain2 = this.ctx.createGain();
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(659.25, now2); // E5
          gain2.gain.setValueAtTime(0.12, now2);
          gain2.gain.exponentialRampToValueAtTime(0.01, now2 + 0.15);
          osc2.connect(gain2);
          gain2.connect(this.ctx.destination);
          osc2.start(now2);
          osc2.stop(now2 + 0.15);
        }, 70);
      }

      playCrash() {
        this.init();
        if (!this.ctx) return;

        const now = this.ctx.currentTime;

        // Generate retro white noise burst for explosion
        const bufferSize = this.ctx.sampleRate * 0.35;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noiseSource = this.ctx.createBufferSource();
        noiseSource.buffer = buffer;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, now);
        filter.frequency.exponentialRampToValueAtTime(60, now + 0.3);

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);

        noiseSource.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        noiseSource.start(now);
        noiseSource.stop(now + 0.35);

        // Sub-bass rumble
        const bass = this.ctx.createOscillator();
        const bassGain = this.ctx.createGain();
        bass.type = 'sawtooth';
        bass.frequency.setValueAtTime(120, now);
        bass.frequency.linearRampToValueAtTime(30, now + 0.28);
        bassGain.gain.setValueAtTime(0.2, now);
        bassGain.gain.exponentialRampToValueAtTime(0.01, now + 0.28);
        bass.connect(bassGain);
        bassGain.connect(this.ctx.destination);
        bass.start(now);
        bass.stop(now + 0.28);
      }
    }

    const sound = new SoundEffects();

    // --- GAME ENGINE SETUP ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');
    const hudScore = document.getElementById('hud-score');
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    
    const startHighscoreVal = document.getElementById('start-highscore-val');
    const finalScoreVal = document.getElementById('final-score-val');
    const bestScoreVal = document.getElementById('best-score-val');
    const newHighBadge = document.getElementById('new-high-badge');

    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');

    // Canvas Logic Sizes (Fixed Aspect Ratio)
    const cw = 400;
    const ch = 700;
    const groundHeight = 90;

    let gameState = 'START'; // 'START', 'PLAYING', 'GAMEOVER'
    let score = 0;
    let highScore = parseInt(localStorage.getItem('flappy_high_score')) || 0;
    startHighscoreVal.textContent = highScore;

    // Difficulty params
    const baseSpeed = 190;      // px/s
    const baseGap = 160;        // px
    const baseSpawnInterval = 1.8; // s

    let gameSpeed = baseSpeed;
    let gapSize = baseGap;
    let spawnInterval = baseSpawnInterval;
    let pipeSpawnTimer = 0;

    let flashOpacity = 0;
    let screenShakeTime = 0;

    // Parallax background offsets
    let groundScroll = 0;
    let cloudScroll = 0;

    // --- BIRD CLASS ---
    class Bird {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = 110;
        this.y = ch / 2 - 20;
        this.radius = 16;
        this.vy = 0;
        this.gravity = 1150; // px/s^2
        this.jumpForce = -380; // px/s
        this.rotation = 0;
        this.flapTimer = 0;
      }

      flap() {
        this.vy = this.jumpForce;
        sound.playFlap();
        // Spawn minor puff particles at tail
        for (let i = 0; i < 4; i++) {
          particles.push(new Particle(
            this.x - 12,
            this.y + (Math.random() - 0.5) * 12,
            'flap'
          ));
        }
      }

      update(dt) {
        if (gameState === 'PLAYING') {
          this.vy += this.gravity * dt;
          if (this.vy > 550) this.vy = 550; // Cap falling speed
          this.y += this.vy * dt;

          // Upper boundary clamp
          if (this.y - this.radius <= 0) {
            this.y = this.radius;
            this.vy = 0;
          }

          // Animate rotation based on velocity
          let targetRot = Math.atan2(this.vy, 220) * 0.85;
          targetRot = Math.max(-0.4, Math.min(1.2, targetRot));
          this.rotation += (targetRot - this.rotation) * 12 * dt;

          this.flapTimer += dt * 18;
        } else if (gameState === 'GAMEOVER') {
          // Just fall down on game over
          if (this.y + this.radius < ch - groundHeight) {
            this.vy += this.gravity * dt;
            this.y += this.vy * dt;
            this.rotation = Math.min(Math.PI / 2, this.rotation + Math.PI * dt);
          }
        } else {
          // Hover gently on start screen
          this.y = ch / 2 - 20 + Math.sin(Date.now() * 0.005) * 12;
          this.rotation = 0;
          this.flapTimer += dt * 5;
        }
      }

      draw(c) {
        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.rotation);

        // Draw tail feathers
        c.fillStyle = '#ea580c';
        c.beginPath();
        c.moveTo(-13, -4);
        c.lineTo(-21, -9);
        c.lineTo(-19, 0);
        c.lineTo(-21, 9);
        c.lineTo(-13, 4);
        c.closePath();
        c.fill();
        c.strokeStyle = '#6b21a8';
        c.lineWidth = 1.5;
        c.stroke();

        // Draw body (Gradient)
        const bodyGrad = c.createRadialGradient(-3, -3, 2, 0, 0, this.radius);
        bodyGrad.addColorStop(0, '#fffbeb');
        bodyGrad.addColorStop(0.3, '#f59e0b');
        bodyGrad.addColorStop(1, '#d97706');
        
        c.fillStyle = bodyGrad;
        c.beginPath();
        c.arc(0, 0, this.radius, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = '#451a03';
        c.lineWidth = 2.5;
        c.stroke();

        // Draw eye
        c.fillStyle = '#ffffff';
        c.beginPath();
        c.arc(6, -5, 5, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = '#451a03';
        c.lineWidth = 1.5;
        c.stroke();

        c.fillStyle = '#0f172a';
        c.beginPath();
        c.arc(8, -5, 2.2, 0, Math.PI * 2);
        c.fill();

        // Draw beak
        c.fillStyle = '#f97316';
        c.beginPath();
        c.moveTo(11, -2);
        c.lineTo(23, 2);
        c.lineTo(11, 6);
        c.closePath();
        c.fill();
        c.strokeStyle = '#451a03';
        c.lineWidth = 1.8;
        c.stroke();

        // Draw wing
        c.save();
        c.translate(-3, 2);
        const wingFlap = Math.sin(this.flapTimer) * 4.5;
        c.rotate(wingFlap * 0.08);
        c.fillStyle = '#fbbf24';
        c.beginPath();
        c.ellipse(-2, -wingFlap / 2, 10, 7.5, Math.PI / 6, 0, Math.PI * 2);
        c.fill();
        c.strokeStyle = '#451a03';
        c.lineWidth = 1.8;
        c.stroke();
        c.restore();

        c.restore();
      }
    }

    // --- PIPE CLASS ---
    class Pipe {
      constructor(x, gap, speed) {
        this.x = x;
        this.width = 68;
        this.gap = gap;
        this.speed = speed;
        this.passed = false;
        
        const minHeight = 70;
        const maxHeight = ch - groundHeight - gap - minHeight;
        this.topHeight = minHeight + Math.random() * (maxHeight - minHeight);
        this.bottomHeight = ch - groundHeight - this.topHeight - gap;
      }

      update(dt, currentSpeed) {
        this.x -= currentSpeed * dt;
      }

      draw(c) {
        const lipHeight = 22;
        const lipWider = 5;

        // Subtle 3D shadow effect drawn behind pipe
        c.fillStyle = 'rgba(7, 11, 25, 0.12)';
        c.fillRect(this.x + 8, 0, this.width, this.topHeight);
        c.fillRect(this.x + 8, ch - groundHeight - this.bottomHeight, this.width, this.bottomHeight);

        // Pipe gradient
        const pipeGrad = c.createLinearGradient(this.x, 0, this.x + this.width, 0);
        pipeGrad.addColorStop(0, '#10b981'); // Emerald 500
        pipeGrad.addColorStop(0.25, '#34d399'); // Highlight
        pipeGrad.addColorStop(0.7, '#059669'); // Darker Green
        pipeGrad.addColorStop(1, '#064e3b'); // Edge shadow

        c.fillStyle = pipeGrad;

        // Top Pipe
        c.fillRect(this.x, 0, this.width, this.topHeight - lipHeight);
        c.fillRect(this.x - lipWider, this.topHeight - lipHeight, this.width + lipWider * 2, lipHeight);

        // Bottom Pipe
        c.fillRect(this.x, ch - groundHeight - this.bottomHeight + lipHeight, this.width, this.bottomHeight - lipHeight);
        c.fillRect(this.x - lipWider, ch - groundHeight - this.bottomHeight, this.width + lipWider * 2, lipHeight);

        // Outline borders
        c.strokeStyle = '#022c22';
        c.lineWidth = 2.5;

        c.strokeRect(this.x, -5, this.width, this.topHeight - lipHeight + 5);
        c.strokeRect(this.x - lipWider, this.topHeight - lipHeight, this.width + lipWider * 2, lipHeight);

        c.strokeRect(this.x, ch - groundHeight - this.bottomHeight + lipHeight, this.width, this.bottomHeight - lipHeight + 5);
        c.strokeRect(this.x - lipWider, ch - groundHeight - this.bottomHeight, this.width + lipWider * 2, lipHeight);
      }
    }

    // --- PARTICLE CLASS ---
    class Particle {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.life = 1.0;
        this.maxLife = 1.0;
        this.color = '#fff';

        if (type === 'flap') {
          this.vx = -110 - Math.random() * 60;
          this.vy = (Math.random() - 0.5) * 40;
          this.size = 2 + Math.random() * 4;
          this.life = this.maxLife = 0.45;
          this.color = `rgba(255, 255, 255, ${0.4 + Math.random() * 0.3})`;
        } else if (type === 'score') {
          const angle = Math.random() * Math.PI * 2;
          const speed = 110 + Math.random() * 140;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed - 60; // Bias upward
          this.size = 4.5 + Math.random() * 5.5;
          this.life = this.maxLife = 0.75;
          const colors = ['#f59e0b', '#fbbf24', '#fef08a', '#ffd700'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
          this.rotation = Math.random() * Math.PI * 2;
          this.rotSpeed = (Math.random() - 0.5) * 12;
        } else if (type === 'crash') {
          const angle = Math.random() * Math.PI * 2;
          const speed = 60 + Math.random() * 150;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.size = 3.5 + Math.random() * 6;
          this.life = this.maxLife = 0.55;
          const colors = ['#ef4444', '#f97316', '#fbbf24', '#ffffff'];
          this.color = colors[Math.floor(Math.random() * colors.length)];
        }
      }

      update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt;
        if (this.type === 'score') {
          this.vy += 120 * dt; // Gravity on score stars
          this.rotation += this.rotSpeed * dt;
        }
      }

      draw(c) {
        const alpha = Math.max(0, this.life / this.maxLife);
        c.save();
        c.globalAlpha = alpha;

        if (this.type === 'score') {
          // Draw star particle
          c.translate(this.x, this.y);
          c.rotate(this.rotation);
          drawStar(c, 0, 0, 5, this.size, this.size / 2, this.color);
        } else {
          c.fillStyle = this.color;
          c.beginPath();
          c.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          c.fill();
        }
        c.restore();
      }
    }

    function drawStar(c, cx, cy, spikes, outerRadius, innerRadius, color) {
      let rot = Math.PI / 2 * 3;
      let x = cx;
      let y = cy;
      let step = Math.PI / spikes;

      c.beginPath();
      c.moveTo(cx, cy - outerRadius);
      for (let i = 0; i < spikes; i++) {
        x = cx + Math.cos(rot) * outerRadius;
        y = cy + Math.sin(rot) * outerRadius;
        c.lineTo(x, y);
        rot += step;

        x = cx + Math.cos(rot) * innerRadius;
        y = cy + Math.sin(rot) * innerRadius;
        c.lineTo(x, y);
        rot += step;
      }
      c.lineTo(cx, cy - outerRadius);
      c.closePath();
      c.fillStyle = color;
      c.fill();
    }

    // --- GAME INITIALIZATION ---
    const bird = new Bird();
    let pipes = [];
    let particles = [];
    let clouds = [];

    // Initialize decorative clouds
    for (let i = 0; i < 4; i++) {
      clouds.push({
        x: Math.random() * cw,
        y: 40 + Math.random() * 110,
        speed: 8 + Math.random() * 12,
        scale: 0.6 + Math.random() * 0.7
      });
    }

    // --- INPUT REGISTRATION ---
    const triggerFlap = (e) => {
      if (e && e.cancelable) e.preventDefault();
      
      if (gameState === 'PLAYING') {
        bird.flap();
      }
    };

    // Listen on the full game container for taps/clicks
    gameContainer.addEventListener('mousedown', (e) => {
      if (e.target.closest('button')) return; // Avoid capturing buttons
      triggerFlap(e);
    });

    gameContainer.addEventListener('touchstart', (e) => {
      if (e.target.closest('button')) return;
      triggerFlap(e);
    }, { passive: false });

    // Keyboard support
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (gameState === 'PLAYING') {
          bird.flap();
        } else if (gameState === 'START') {
          startGame();
        } else if (gameState === 'GAMEOVER') {
          restartGame();
        }
      }
    });

    startBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      startGame();
    });

    restartBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      restartGame();
    });

    function startGame() {
      sound.init();
      gameState = 'PLAYING';
      score = 0;
      hudScore.textContent = '0';
      hudScore.classList.add('visible');
      
      bird.reset();
      pipes = [];
      particles = [];
      pipeSpawnTimer = 0;
      gameSpeed = baseSpeed;
      gapSize = baseGap;
      spawnInterval = baseSpawnInterval;

      startScreen.classList.remove('active');
      bird.flap(); // Flap immediately on start so the player is ready
    }

    function restartGame() {
      sound.init();
      gameState = 'PLAYING';
      score = 0;
      hudScore.textContent = '0';
      hudScore.classList.add('visible');
      
      bird.reset();
      pipes = [];
      particles = [];
      pipeSpawnTimer = 0;
      gameSpeed = baseSpeed;
      gapSize = baseGap;
      spawnInterval = baseSpawnInterval;

      gameoverScreen.classList.remove('active');
      newHighBadge.style.display = 'none';
      bird.flap();
    }

    function triggerGameOver() {
      gameState = 'GAMEOVER';
      hudScore.classList.remove('visible');
      sound.playCrash();
      screenShakeTime = 0.35;
      flashOpacity = 0.85;

      // Spawn extensive crash fragments
      for (let i = 0; i < 18; i++) {
        particles.push(new Particle(bird.x, bird.y, 'crash'));
      }

      let isNewHigh = false;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('flappy_high_score', highScore);
        isNewHigh = true;
      }

      finalScoreVal.textContent = score;
      bestScoreVal.textContent = highScore;
      
      if (isNewHigh) {
        newHighBadge.style.display = 'inline-block';
      } else {
        newHighBadge.style.display = 'none';
      }

      // Briefly wait before popping the game over window for transition smoothness
      setTimeout(() => {
        if (gameState === 'GAMEOVER') {
          gameoverScreen.classList.add('active');
        }
      }, 700);
    }

    // AABB & Circle Collision Detection Helper
    function checkCircleRectCollision(circle, rectX, rectY, rectW, rectH) {
      const closestX = Math.max(rectX, Math.min(circle.x, rectX + rectW));
      const closestY = Math.max(rectY, Math.min(circle.y, rectY + rectH));
      const dx = circle.x - closestX;
      const dy = circle.y - closestY;
      const distanceSquared = dx * dx + dy * dy;
      return distanceSquared < circle.radius * circle.radius;
    }

    // --- GAME LOOPS & RENDERING ---
    let lastTime = 0;
    let accumulator = 0;
    const timeStep = 1000 / 60; // Strict 60hz physics updates

    function updatePhysics(dt) {
      // Background and visual states
      if (gameState !== 'GAMEOVER') {
        const speedMultiplier = gameState === 'PLAYING' ? gameSpeed : 40;
        groundScroll = (groundScroll + speedMultiplier * dt) % 24;
        cloudScroll = (cloudScroll + 12 * dt) % cw;
      }

      flashOpacity = Math.max(0, flashOpacity - dt * 3.5);
      screenShakeTime = Math.max(0, screenShakeTime - dt);

      // Clouds update
      clouds.forEach(cloud => {
        cloud.x -= cloud.speed * dt;
        if (cloud.x + 80 * cloud.scale < 0) {
          cloud.x = cw + 50;
          cloud.y = 40 + Math.random() * 110;
          cloud.speed = 8 + Math.random() * 12;
        }
      });

      // Bird update
      bird.update(dt);

      if (gameState === 'PLAYING') {
        // Increment spawn timer
        pipeSpawnTimer += dt;
        if (pipeSpawnTimer >= spawnInterval) {
          pipes.push(new Pipe(cw, gapSize, gameSpeed));
          pipeSpawnTimer = 0;
        }

        // Pipes update
        for (let i = pipes.length - 1; i >= 0; i--) {
          const pipe = pipes[i];
          pipe.update(dt, gameSpeed);

          // Scoring Check
          if (!pipe.passed && bird.x > pipe.x + pipe.width / 2) {
            pipe.passed = true;
            score++;
            sound.playScore();
            
            // HUD Pop effect
            hudScore.textContent = score;
            hudScore.classList.add('pop');
            setTimeout(() => hudScore.classList.remove('pop'), 150);

            // Spawn score star particles
            for (let p = 0; p < 8; p++) {
              particles.push(new Particle(bird.x + 10, bird.y, 'score'));
            }

            // Difficulty progression every 4 points
            if (score > 0 && score % 4 === 0) {
              gameSpeed = Math.min(320, baseSpeed + Math.floor(score / 4) * 15);
              gapSize = Math.max(115, baseGap - Math.floor(score / 4) * 5);
              spawnInterval = Math.max(1.25, baseSpawnInterval - Math.floor(score / 4) * 0.08);
            }
          }

          // Collisions Check
          const hasCollided = 
            checkCircleRectCollision(bird, pipe.x, 0, pipe.width, pipe.topHeight) ||
            checkCircleRectCollision(bird, pipe.x, ch - groundHeight - pipe.bottomHeight, pipe.width, pipe.bottomHeight);

          if (hasCollided) {
            triggerGameOver();
          }

          // Cleanup offscreen pipes
          if (pipe.x + pipe.width < 0) {
            pipes.splice(i, 1);
          }
        }
      }

      // Check ground collision
      if (gameState === 'PLAYING' && bird.y + bird.radius >= ch - groundHeight) {
        triggerGameOver();
      }

      // Particles update
      for (let i = particles.length - 1; i >= 0; i--) {
        const particle = particles[i];
        particle.update(dt);
        if (particle.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, cw, ch);
      
      ctx.save();
      // Apply screen shake if active
      if (screenShakeTime > 0) {
        const intensity = 8 * (screenShakeTime / 0.35);
        const dx = (Math.random() - 0.5) * intensity * 2;
        const dy = (Math.random() - 0.5) * intensity * 2;
        ctx.translate(dx, dy);
      }

      // 1. SKY GRADIENT (Sunset Horizon look)
      const skyGrad = ctx.createLinearGradient(0, 0, 0, ch);
      skyGrad.addColorStop(0, '#0c1b40'); // Deep dark night sky
      skyGrad.addColorStop(0.4, '#1e293b'); // Navy slate
      skyGrad.addColorStop(0.75, '#1e1b4b'); // Twilight purple
      skyGrad.addColorStop(1, '#311042'); // Sunset horizon plum
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, cw, ch);

      // Draw distant soft glow sun
      const sunGrad = ctx.createRadialGradient(cw / 2, ch - groundHeight - 60, 5, cw / 2, ch - groundHeight - 60, 200);
      sunGrad.addColorStop(0, 'rgba(244, 63, 94, 0.25)'); // Rose glow
      sunGrad.addColorStop(0.5, 'rgba(124, 58, 237, 0.08)'); // Purple glow
      sunGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
      ctx.fillStyle = sunGrad;
      ctx.beginPath();
      ctx.arc(cw / 2, ch - groundHeight - 60, 200, 0, Math.PI * 2);
      ctx.fill();

      // 2. PARALLAX CLOUDS
      clouds.forEach(cloud => {
        ctx.save();
        ctx.translate(cloud.x, cloud.y);
        ctx.scale(cloud.scale, cloud.scale);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.07)';
        ctx.beginPath();
        ctx.arc(20, 20, 15, 0, Math.PI * 2);
        ctx.arc(40, 12, 20, 0, Math.PI * 2);
        ctx.arc(60, 20, 15, 0, Math.PI * 2);
        ctx.rect(20, 15, 40, 15);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });

      // 3. PARALLAX MOUNTAINS (Distant silhouettes)
      ctx.fillStyle = '#111029';
      for (let s = 0; s < 2; s++) {
        const offset = (cloudScroll * 0.4) % cw;
        const startX = -offset + s * cw;
        ctx.beginPath();
        ctx.moveTo(startX, ch - groundHeight);
        ctx.lineTo(startX + 80, ch - groundHeight - 120);
        ctx.lineTo(startX + 180, ch - groundHeight - 70);
        ctx.lineTo(startX + 280, ch - groundHeight - 160);
        ctx.lineTo(startX + 340, ch - groundHeight - 100);
        ctx.lineTo(startX + cw, ch - groundHeight);
        ctx.closePath();
        ctx.fill();
      }

      // 4. PARALLAX HILLS/FOREST (Midground silhouettes)
      ctx.fillStyle = '#0f172a';
      for (let s = 0; s < 2; s++) {
        const offset = (cloudScroll * 1.5) % cw;
        const startX = -offset + s * cw;
        ctx.beginPath();
        ctx.moveTo(startX, ch - groundHeight);
        for (let x = 0; x <= cw; x += 50) {
          ctx.lineTo(startX + x, ch - groundHeight - (35 + Math.sin(x + s) * 12));
        }
        ctx.lineTo(startX + cw, ch - groundHeight);
        ctx.closePath();
        ctx.fill();
      }

      // 5. PIPES
      pipes.forEach(pipe => pipe.draw(ctx));

      // 6. PARTICLES
      particles.forEach(particle => particle.draw(ctx));

      // 7. BIRD
      bird.draw(ctx);

      // 8. SCROLLING GROUND
      // Under shadow
      ctx.fillStyle = 'rgba(7, 11, 25, 0.25)';
      ctx.fillRect(0, ch - groundHeight, cw, 6);

      // Ground Top Grass
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, ch - groundHeight + 6, cw, groundHeight - 6);

      // Neon grass border
      ctx.fillStyle = '#10b981';
      ctx.fillRect(0, ch - groundHeight + 6, cw, 8);

      // Animated diagonal grass dashes for motion illusion
      ctx.strokeStyle = '#047857';
      ctx.lineWidth = 4;
      ctx.beginPath();
      for (let x = -30; x < cw + 30; x += 22) {
        ctx.moveTo(x - groundScroll, ch - groundHeight + 14);
        ctx.lineTo(x - groundScroll + 12, ch - groundHeight + 26);
      }
      ctx.stroke();

      // Earth core bottom gradient
      const earthGrad = ctx.createLinearGradient(0, ch - groundHeight + 20, 0, ch);
      earthGrad.addColorStop(0, '#1e293b');
      earthGrad.addColorStop(1, '#0f172a');
      ctx.fillStyle = earthGrad;
      ctx.fillRect(0, ch - groundHeight + 26, cw, groundHeight - 26);

      // 9. DAMAGE SCREEN FLASH overlay
      if (flashOpacity > 0) {
        ctx.fillStyle = `rgba(255, 255, 255, ${flashOpacity})`;
        ctx.fillRect(0, 0, cw, ch);
      }

      ctx.restore();
    }

    // Main animation loop with fixed accumulator update
    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let elapsed = timestamp - lastTime;
      lastTime = timestamp;

      // Cap delta time to prevent physics crashes when switching tabs
      if (elapsed > 100) elapsed = 100;

      accumulator += elapsed;
      while (accumulator >= timeStep) {
        updatePhysics(timeStep / 1000);
        accumulator -= timeStep;
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    // Start requestAnimationFrame loop
    requestAnimationFrame(gameLoop);

  </script>
</body>
</html>
